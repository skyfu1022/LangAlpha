# =============================================================================
# AGENT CONFIGURATION
# =============================================================================
# This file contains agent capabilities and tool settings.
# Credentials should be stored in .env file.
# For non agent related config, see config.yaml

llm:
  # Model name from src/llms/manifest/models.json
  name: "qwen3.5-plus"
  flash: "qwen3.5-flash"
  summarization: "qwen3.5-flash" # defaults to flash model
  fetch: "qwen3.5-flash"         # defaults to flash model
  fallback:
    - "kimi-k2.5"
    - "minimax-m2.7"
    - "glm-5-turbo"

sandbox:
  # Provider selection: "daytona" (cloud) or "docker" (local).
  # - daytona: Cloud-hosted sandboxes via Daytona API. Each workspace gets an isolated
  #   VM with auto-stop/archive/delete lifecycle. Snapshots are versioned by a hash of
  #   this config (working_dir, Python version, dependencies, apt packages).
  # - docker: Local Docker containers using Dockerfile.sandbox. Useful for development.
  # Override at runtime with SANDBOX_PROVIDER env var.
  provider: "daytona"

  # Daytona cloud sandbox configuration
  daytona:
    base_url: "https://app.daytona.io/api"
    auto_stop_interval: 3600 # 1 hour in seconds
    auto_archive_interval: 86400 # 24 hours in seconds
    auto_delete_interval: 604800 # 7 days in seconds
    python_version: "3.12"

    # Hash will be automatically appended based on dependencies
    snapshot_enabled: true # Recommended: Enable snapshot-based sandbox creation
    snapshot_name: "langalpha" # Base name for snapshot (hash will be appended)
    snapshot_auto_create: true # Automatically create snapshot if it doesn't exist

  # Docker local sandbox configuration
  # Ignored when provider is "daytona". Override with DOCKER_SANDBOX_* env vars.
  docker:
    image: "langalpha-sandbox:latest" # Build with: docker build -f Dockerfile.sandbox -t langalpha-sandbox:latest .
    memory_limit: "4g"
    cpu_count: 2.0
    network_mode: "bridge" # "bridge" (default) or "none" for full isolation
    dev_mode: false # true = bind-mount host dir (fast local dev, files shared instantly)
    # host_work_dir: "/tmp/langalpha-sandbox-work"  # Required when dev_mode is true
    # volumes:  # Extra mounts in "host:container[:ro]" format
    #   - "/data/datasets:/mnt/datasets:ro"

mcp:
  # MCP server configurations
  # Note: Filesystem is now a first-class tool (see filesystem section below)
  # Each server can have 'enabled: true/false' to enable/disable it (default: true)
  servers:
    # Price data MCP server for OHLCV time series.
    - name: "price_data"
      enabled: true
      description: "OHLCV price data and short sale analytics for stocks, commodities, crypto, forex"
      instruction: "Use for raw OHLCV time series data (get_stock_data/get_asset_data) and short interest/volume data (get_short_data). Supports daily and intraday intervals. Short data supports date range filters."
      tool_exposure_mode: "detailed"
      transport: "stdio"
      command: "uv"
      args: ["run", "python", "mcp_servers/price_data_mcp_server.py"]
      env:
        FMP_API_KEY: "${FMP_API_KEY}"
        GINLIX_DATA_URL: "${GINLIX_DATA_URL}"

    # Fundamentals MCP server for financial statements, ratios, growth, valuation,
    # insider trades, dividends/splits, shares float, key executives, and technical indicators.
    - name: "fundamentals"
      enabled: true
      description: "Raw fundamental data, ownership, and technical indicators for multi-year analysis"
      instruction: "Use for financial statements, ratios, growth metrics, valuation data, insider trades, dividends/splits, shares float, key executives, and technical indicators. Returns raw JSON for programmatic analysis, charting, and model building."
      tool_exposure_mode: "summary"
      transport: "stdio"
      command: "uv"
      args: ["run", "python", "mcp_servers/fundamentals_mcp_server.py"]
      env:
        FMP_API_KEY: "${FMP_API_KEY}"

    # Macro MCP server for economic indicators, treasury rates, risk premium, and event calendars.
    - name: "macro"
      enabled: true
      description: "Economic indicators, treasury rates, earnings calendar, and macro events"
      instruction: "Use for macro-economic data: GDP, CPI, unemployment, treasury yield curve, risk-free rate for DCF, earnings calendar by date range, and economic event calendar. Returns raw JSON."
      tool_exposure_mode: "summary"
      transport: "stdio"
      command: "uv"
      args: ["run", "python", "mcp_servers/macro_mcp_server.py"]
      env:
        FMP_API_KEY: "${FMP_API_KEY}"

    # Options MCP server for contracts chain, OHLCV, and real-time snapshots.
    # Returns raw JSON for programmatic analysis (IV surfaces, strategy modeling, charting).
    - name: "options"
      enabled: true
      description: "Options contracts chain, historical OHLCV, and real-time snapshots"
      instruction: "Use for in-depth options analysis: list contracts/chain (get_options_chain), historical OHLCV bars (get_options_prices), and real-time bid/ask snapshots (get_options_snapshot). Returns raw JSON for programmatic analysis, charting, and strategy modeling. Options tickers use format O:AAPL251219C00150000."
      tool_exposure_mode: "detailed"
      transport: "stdio"
      command: "uv"
      args: ["run", "python", "mcp_servers/options_mcp_server.py"]
      env:
        GINLIX_DATA_URL: "${GINLIX_DATA_URL}"

    - name: "tavily"
      enabled: false
      description: "Web search engine for finding current information online"
      instruction: "Use for web searches, news, research, and real-time information. Best for queries requiring up-to-date data from the internet."
      tool_exposure_mode: "summary" # Brief - 4 simple tools
      transport: "stdio"
      command: "npx"
      args: ["-y", "tavily-mcp@latest"]
      env:
        TAVILY_API_KEY: "${TAVILY_API_KEY}"

    - name: "yf_price"
      enabled: true
      description: "Yahoo Finance price history, dividends, and splits data"
      instruction: "Use for historical OHLCV price data, dividend history, stock splits, and multi-stock price comparisons. Returns large time series ideal for code-based analysis."
      tool_exposure_mode: "summary"
      transport: "stdio"
      command: "uv"
      args: ["run", "python", "mcp_servers/yf_price_mcp_server.py"]
      env: {}

    - name: "yf_fundamentals"
      enabled: true
      description: "Yahoo Finance financial statements, earnings, company info, and valuations"
      instruction: "Use for income statements, balance sheets, cash flow, earnings data, company info, and valuation comparisons across multiple stocks. Returns structured financial data ideal for fundamental analysis."
      tool_exposure_mode: "summary"
      transport: "stdio"
      command: "uv"
      args: ["run", "python", "mcp_servers/yf_fundamentals_mcp_server.py"]
      env: {}

    - name: "yf_analysis"
      enabled: true
      description: "Yahoo Finance analyst data, holdings, insiders, news, and ESG"
      instruction: "Use for analyst recommendations, price targets, upgrades/downgrades, earnings estimates, institutional/mutual fund holders, insider transactions, news, and ESG sustainability scores."
      tool_exposure_mode: "summary"
      transport: "stdio"
      command: "uv"
      args: ["run", "python", "mcp_servers/yf_analysis_mcp_server.py"]
      env: {}

    - name: "yf_market"
      enabled: true
      description: "Yahoo Finance market status, search, screener, calendars, sectors"
      instruction: "Use for ticker search, stock screening (custom and predefined), earnings calendars, market status, and sector/industry analysis. Best for market-wide discovery and screening."
      tool_exposure_mode: "summary"
      transport: "stdio"
      command: "uv"
      args: ["run", "python", "mcp_servers/yf_market_mcp_server.py"]
      env: {}

    # Scrapling web scraping MCP server
    # Provides get, bulk_get, fetch, bulk_fetch, stealthy_fetch, bulk_stealthy_fetch
    - name: "scrapling"
      enabled: true
      description: "Web scraping with anti-bot bypass, CSS selection, and markdown extraction"
      instruction: "Use for scraping web pages. Choose extraction_type='markdown' for readable content. Use 'get' for fast HTTP requests, 'fetch' for JS-rendered pages, 'stealthy_fetch' for Cloudflare-protected sites. Bulk variants accept multiple URLs for parallel scraping."
      tool_exposure_mode: "summary"
      transport: "stdio"
      command: "scrapling"
      args: ["mcp"]
      env: {}

    # Not enabled in Porduction or maintained by us
    - name: "alphavantage"
      enabled: false
      description: "Financial market data API for stocks, forex, crypto, and economic indicators"
      instruction: "Use for stock quotes, historical prices, technical indicators, forex rates, crypto data, and economic data."
      tool_exposure_mode: "summary" # Full signatures - 118 complex tools
      transport: "http"
      url: "https://mcp.alphavantage.co/mcp?apikey=${ALPHA_VANTAGE_API_KEY}"

  # Tool discovery settings
  tool_discovery_enabled: true
  lazy_load: true # Load tools on-demand
  cache_duration: 300 # Cache tool metadata for 5 minutes

filesystem:
  # Filesystem access configuration for first-class filesystem tools.
  # These tools provide direct file and directory operations without code generation.

  # Working directory inside the sandbox — the root for all agent file operations.
  # Agent sees virtual paths like /results/file.txt which map to {working_directory}/results/file.txt.
  # Must match the home directory of the sandbox user (created in Dockerfile.sandbox).
  # Changing this value triggers automatic workspace migration: existing workspaces will
  # back up files to PostgreSQL and recreate their sandbox with the new working directory
  # on next reconnect (tracked via sandbox_config_hash in workspaces.config JSONB).
  working_directory: "/home/workspace"

  # allowed_directories and denied_directories are auto-derived from working_directory:
  #   allowed: [working_directory, "/tmp"]
  #   denied:  [working_directory/_internal]
  # Override only if you need custom values.

  enable_path_validation: true # Validate paths against allowed_directories

storage:
  # Cloud storage provider for image/chart/file uploads and avator
  # All credentials and settings are loaded from .env file
  # Options: s3, r2, oss, none (to disable uploads)
  provider: "s3"

logging:
  # Logging configuration
  level: "INFO" # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/ptc.log"

agent:
  enable_view_image: true
  background_auto_wait: false

# Subagent configuration
subagents:
  # List of enabled subagents (available: research, general-purpose, data-prep, equity-analyst, report-builder, plus user-defined)
  enabled:
    - general-purpose
    - research
    - data-prep
    - equity-analyst
    - report-builder

  # User-defined subagents (optional). Each key becomes a subagent name.
  # definitions:
  #   equity-analyst:
  #     description: "Specialized equity research analyst for deep-dive company analysis"
  #     mode: ptc                              # ptc or flash
  #     role_prompt: |
  #       You are a senior equity research analyst...
  #     tools: [execute_code, filesystem, finance, web_search]
  #     skills: [automation]                   # Runtime-loaded via SkillsMiddleware
  #     preload_skills: [creating-financial-models, xlsx]  # Injected into prompt
  #     max_iterations: 15
  #     sections:
  #       workspace_paths: true
  #       tool_guide: true
  #       data_processing: true
  #       visualizations: true

# Summarization Middleware Configuration
# Automatically summarizes conversation history when approaching token limits
summarization:
  enabled: true # Enable/disable conversation summarization
  token_threshold: 120000 # Trigger summarization when messages exceed this token count
  keep_messages: 10 # Preserve last N messages after summarization
  truncate_args_trigger_messages: 40 # Truncate tool args when >= N messages (Tier 1)
  truncate_args_keep_messages: 10 # Protect last N messages from arg truncation
  truncate_args_max_length: 2000 # Per-arg-value max chars before truncation

# =============================================================================
# TOOL CONFIGURATION
# =============================================================================

# Search API Configuration
# Options: tavily, bocha, serper
search_api: tavily

# Crawler Configuration
# Web crawling with SafeCrawlerWrapper for circuit breaker and fault tolerance.
# Backend: "scrapling" uses tiered HTTP→browser→stealth fetching.
crawler:
  backend: "router" # Options: "scrapling", "router" (adds PDF/YouTube/X extraction)
  max_concurrent_crawls: 20 # Max parallel browser contexts (adjust based on RAM: ~150MB each)
  page_timeout: 60000 # Page load timeout in ms
  delay_before_return: 3 # Seconds to wait for JS rendering after DOM ready

  # Circuit breaker settings - prevents cascade failures when browser has issues
  circuit_breaker:
    failure_threshold: 5 # Number of failures before opening circuit
    recovery_timeout: 60 # Seconds before attempting recovery (half-open state)
    success_threshold: 2 # Successes needed to close circuit after recovery

  # Queue limits - prevents resource exhaustion
  queue:
    max_size: 100 # Maximum queued crawl requests
    slot_timeout: 10 # Seconds to wait for crawl slot before giving up

# Web Fetch Configuration
# Settings for web_fetch tool's sitemap-aware content extraction
web_fetch:
  sitemap_enabled: true # Sitemap fetching for URL suggestions
  sitemap_max_urls: 100 # Max URLs to fetch from sitemap
  sitemap_max_examples: 3 # Max example URLs per path prefix in summary
  sitemap_timeout: 10 # Timeout in seconds for sitemap fetch

# Embedding Model Configuration (Currently not in use)
embedding:
  model: embedding-small # Options: embedding-small, embedding-large (see src/llms/llm_config.json)
  batch_size: 100 # Number of texts to embed in a single batch
  enable_auto_embedding: true # Auto-generate embeddings for new infoflow results
  hybrid_search_alpha: 0.5 # Balance between semantic (0.0) and keyword search (1.0)
