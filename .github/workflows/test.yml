name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --group dev --extra test
      - run: uv run pytest tests/unit/ -v --tb=short --junitxml=test-results/backend-unit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-results
          path: test-results/

  backend-integration:
    runs-on: ubuntu-latest
    needs: backend-unit
    if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
    environment: integration
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: langalpha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: langalpha_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --group dev --extra test
      - run: sudo apt-get install -y ripgrep
      - run: uv run pytest tests/integration/ -v --tb=short -m integration --junitxml=test-results/backend-integration.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-integration-results
          path: test-results/

  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm vitest run --reporter=verbose

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend-unit
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
