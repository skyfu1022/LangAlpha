# Development docker-compose — full-stack local setup
# Usage: cp .env.example .env && <fill in API keys> && docker compose up
#
# For production deployment, use docker-compose.prod.yml instead.

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - langalpha-postgresql-data:/var/lib/postgresql
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-langalpha}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - langalpha-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override host-oriented defaults from .env for container networking
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-langalpha}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      MEMORY_DB_HOST: postgres
      MEMORY_DB_PORT: "5432"
      MEMORY_DB_NAME: ${DB_NAME:-langalpha}
      MEMORY_DB_USER: ${DB_USER:-postgres}
      MEMORY_DB_PASSWORD: ${DB_PASSWORD:-postgres}
      BYOK_ENCRYPTION_KEY: ${BYOK_ENCRYPTION_KEY:-langalpha-local-dev-encryption-key}
      SANDBOX_PROVIDER: ${SANDBOX_PROVIDER:-daytona}
      SUPABASE_URL: ""  # disable auth — all requests use AUTH_USER_ID
    volumes:
      # Mount source for hot-reload
      - ./src:/app/src
      - ./server.py:/app/server.py
      - ./agent_config.yaml:/app/agent_config.yaml
      # Docker socket — only needed when SANDBOX_PROVIDER=docker (DooD pattern).
      # Safe to remove if using only the Daytona provider.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/app/config.yaml
      - ./mcp_servers:/app/mcp_servers
      - ./skills:/app/skills
      - ./scripts:/app/scripts
      - ./alembic.ini:/app/alembic.ini
      - ./migrations:/app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_SUPABASE_URL: ""  # disable auth
    volumes:
      - ./web:/app
      - frontend_node_modules:/app/node_modules

volumes:
  langalpha-postgresql-data:
  langalpha-redis-data:
  frontend_node_modules:
